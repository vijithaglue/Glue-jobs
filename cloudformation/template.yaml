AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Glue ETL job that reads from an S3 source bucket, writes Parquet
  to a target bucket, and registers the output in the Glue Data Catalog.
  Includes GitHub source control integration via a PAT stored in
  Secrets Manager.

Parameters:
  SourceBucketArn:
    Type: String
    Description: ARN of the S3 bucket used as the data source.

  TargetBucketArn:
    Type: String
    Description: ARN of the S3 bucket used as the data target.

  GlueVersion:
    Type: String
    Default: "4.0"
    Description: AWS Glue version for the job.

  WorkerType:
    Type: String
    Default: G.1X
    AllowedValues:
      - G.1X
      - G.2X
      - G.4X
      - G.8X
      - Z.2X
    Description: Worker type for the Glue job.

  NumberOfWorkers:
    Type: Number
    Default: 2
    MinValue: 2
    Description: Number of workers allocated to the Glue job.

  GitHubRepository:
    Type: String
    Default: Glue-jobs
    Description: GitHub repository name.

  GitHubOwner:
    Type: String
    Default: vijithaglue
    Description: GitHub repository owner.

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch name to link for source control.

  DLQPath:
    Type: String
    Default: "s3://athena-ctas-result/dlq/s3toredshift/"
    Description: S3 path prefix for the dead-letter queue used by the S3ToRedshift job.

Resources:
  ScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSGlueServiceRole"
      Policies:
        - PolicyName: SourceBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:ListBucket"
                Resource:
                  - !Ref SourceBucketArn
                  - !Sub "${SourceBucketArn}/*"
        - PolicyName: TargetBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                Resource:
                  - !Ref TargetBucketArn
                  - !Sub "${TargetBucketArn}/*"
        - PolicyName: ScriptBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:ListBucket"
                Resource:
                  - !GetAtt ScriptBucket.Arn
                  - !Sub "${ScriptBucket.Arn}/*"
        - PolicyName: GlueCatalogAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "glue:GetDatabase"
                  - "glue:CreateDatabase"
                  - "glue:GetTable"
                  - "glue:CreateTable"
                  - "glue:UpdateTable"
                Resource: "*"
        - PolicyName: DLQBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:PutObject"
                Resource:
                  - !Sub
                    - "${Path}*"
                    - Path: !Ref DLQPath
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:glue/github-pat*"
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:redshift!redshift-cluster-2-awsuser*"

  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${AWS::StackName}-etl-job"
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: !Ref GlueVersion
      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${ScriptBucket}/glue_job/glue_job.py"
        PythonVersion: "3"
      DefaultArguments:
        "--job-language": python
        "--enable-continuous-cloudwatch-log": "true"
        "--extra-py-files": !Sub "s3://${ScriptBucket}/glue_job/params.py,s3://${ScriptBucket}/glue_job/format_detector.py,s3://${ScriptBucket}/glue_job/__init__.py"
      # SourceControlDetails is configured post-deployment via the AWS CLI:
      # aws glue update-source-control-from-job --job-name <job-name> \
      #   --provider GITHUB --repository-name Glue-jobs \
      #   --repository-owner vijithaglue --branch-name main \
      #   --folder glue_scripts --auth-strategy PERSONAL_ACCESS_TOKEN \
      #   --auth-token <pat-value>

  S3ToRedshiftJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${AWS::StackName}-s3toredshift"
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: !Ref GlueVersion
      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${ScriptBucket}/glue_job/s3toredshift.py"
        PythonVersion: "3"
      DefaultArguments:
        "--job-language": python
        "--enable-continuous-cloudwatch-log": "true"
        "--TempDir": !Sub "s3://${ScriptBucket}/tmp/"
        "--DLQ_PATH": !Ref DLQPath
        "--extra-py-files": !Sub "s3://${ScriptBucket}/glue_job/validation_rule.py,s3://${ScriptBucket}/glue_job/validation_engine.py,s3://${ScriptBucket}/glue_job/dlq_writer.py,s3://${ScriptBucket}/glue_job/staging_merger.py"
      Connections:
        Connections:
          - Redshift-2

Outputs:
  GlueJobName:
    Description: Name of the provisioned Glue job.
    Value: !Ref GlueJob

  S3ToRedshiftJobName:
    Description: Name of the S3-to-Redshift Glue job.
    Value: !Ref S3ToRedshiftJob

  ScriptBucketName:
    Description: Name of the S3 bucket storing the job script.
    Value: !Ref ScriptBucket

  GlueJobRoleArn:
    Description: ARN of the IAM role used by the Glue job.
    Value: !GetAtt GlueJobRole.Arn
