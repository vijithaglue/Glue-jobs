AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Glue ETL job that reads from an S3 source bucket, writes Parquet
  to a target bucket, and registers the output in the Glue Data Catalog.
  Includes GitHub source control integration via a PAT stored in
  Secrets Manager.

Parameters:
  SourceBucketArn:
    Type: String
    Description: ARN of the S3 bucket used as the data source.

  TargetBucketArn:
    Type: String
    Description: ARN of the S3 bucket used as the data target.

  GlueVersion:
    Type: String
    Default: "4.0"
    Description: AWS Glue version for the job.

  WorkerType:
    Type: String
    Default: G.1X
    AllowedValues:
      - G.1X
      - G.2X
      - G.4X
      - G.8X
      - Z.2X
    Description: Worker type for the Glue job.

  NumberOfWorkers:
    Type: Number
    Default: 2
    MinValue: 2
    Description: Number of workers allocated to the Glue job.

  GitHubRepository:
    Type: String
    Default: vijithaglue/Glue-jobs
    Description: GitHub repository in owner/repo format.

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch name to link for source control.

Resources:
  ScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSGlueServiceRole"
      Policies:
        - PolicyName: SourceBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:ListBucket"
                Resource:
                  - !Ref SourceBucketArn
                  - !Sub "${SourceBucketArn}/*"
        - PolicyName: TargetBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                Resource:
                  - !Ref TargetBucketArn
                  - !Sub "${TargetBucketArn}/*"
        - PolicyName: ScriptBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:ListBucket"
                Resource:
                  - !GetAtt ScriptBucket.Arn
                  - !Sub "${ScriptBucket.Arn}/*"
        - PolicyName: GlueCatalogAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "glue:GetDatabase"
                  - "glue:CreateDatabase"
                  - "glue:GetTable"
                  - "glue:CreateTable"
                  - "glue:UpdateTable"
                Resource: "*"
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:glue/github-pat*"

  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${AWS::StackName}-etl-job"
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: !Ref GlueVersion
      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${ScriptBucket}/glue_job/glue_job.py"
        PythonVersion: "3"
      DefaultArguments:
        "--job-language": python
        "--enable-continuous-cloudwatch-log": "true"
      SourceControlDetails:
        Provider: GITHUB
        Repository: !Ref GitHubRepository
        Branch: !Ref GitHubBranch
        Folder: glue_scripts
        AuthStrategy: PERSONAL_ACCESS_TOKEN
        AuthToken: !Sub "{{resolve:secretsmanager:glue/github-pat:SecretString:token}}"

Outputs:
  GlueJobName:
    Description: Name of the provisioned Glue job.
    Value: !Ref GlueJob

  ScriptBucketName:
    Description: Name of the S3 bucket storing the job script.
    Value: !Ref ScriptBucket

  GlueJobRoleArn:
    Description: ARN of the IAM role used by the Glue job.
    Value: !GetAtt GlueJobRole.Arn
